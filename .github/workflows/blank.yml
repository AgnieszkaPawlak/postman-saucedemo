name: Postman API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-tests:
    name: Run Newman API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Newman and reporters
        run: npm install -g newman newman-reporter-html newman-reporter-allure allure-commandline

      - name: Verify Postman files exist
        run: |
          missing=0
          for file in \
            postman/SauceDemo_API_Collection.json \
            postman/SauceDemo_Environment.json; do
            if [ ! -f "$file" ]; then
              echo "::error file=$file::Required file not found. Add and push the postman/ directory to the repository."
              missing=1
            else
              echo "Found $file"
            fi
          done
          exit $missing

      - name: Run Postman API tests
        id: run-tests
        run: |
          mkdir -p newman/reports/allure-results
          newman run postman/SauceDemo_API_Collection.json \
            --environment postman/SauceDemo_Environment.json \
            --reporters cli,html,allure \
            --reporter-html-export newman/reports/api-test-report.html \
            --reporter-allure-resultsDir newman/reports/allure-results \
            --color on
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d newman/reports/allure-results ] && [ "$(ls -A newman/reports/allure-results)" ]; then
            allure generate newman/reports/allure-results -o newman/reports/allure-report --clean
          else
            echo "No Allure results to generate."
          fi

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-api-report
          path: |
            newman/reports/api-test-report.html
            newman/reports/allure-results/
            newman/reports/allure-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Add test summary
        if: always()
        run: |
          {
            echo "## Postman API test results"
            echo ""
            if [ "${{ steps.run-tests.outcome }}" = "success" ]; then
              echo "All Postman API tests passed."
            else
              echo "API tests failed. Download the **newman-api-report** artifact for Newman HTML and Allure reports."
            fi
            echo ""
            echo "Allure report path in artifact: \`allure-report/index.html\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail pipeline when API tests fail
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "API tests failed. See the Newman CLI output or download the Allure report artifact."
          exit 1
