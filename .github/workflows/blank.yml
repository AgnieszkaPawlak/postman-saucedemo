# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman and HTML Reporter
        run: npm install -g newman newman-reporter-html

      - name: Make Script Executable
        run: chmod +x newman/run-api-tests.sh

      - name: Run API Tests
        id: run-tests
        run: ./newman/run-api-tests.sh
        continue-on-error: true

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-api-report
          path: newman/reports/api-test-report.html
          retention-days: 30

      - name: Check Test Results
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "❌ API tests failed. Check the HTML report artifact for details."
          exit 1

      - name: Success Summary
        if: steps.run-tests.outcome == 'success'
        run: |
          echo "✅ All API tests passed successfully!"
