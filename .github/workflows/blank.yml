```yaml
name: Postman API Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-tests:
    name: Run Newman API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install Newman and HTML reporter
        run: |
          npm install --global newman newman-reporter-html

          echo "Node version:"
          node --version

          echo "NPM version:"
          npm --version

          echo "Newman version:"
          newman --version

      - name: Verify Postman files
        run: |
          echo "Current directory:"
          pwd

          echo "Files in repository:"
          find . -maxdepth 3 -type f | sort

          test -f postman/SauceDemo_API_Collection.json
          test -f postman/SauceDemo_Environment.json

      - name: Run Postman API tests
        id: newman
        shell: bash
        run: |
          mkdir -p newman/reports

          set +e
          set -o pipefail

          newman run postman/SauceDemo_API_Collection.json \
            --environment postman/SauceDemo_Environment.json \
            --reporters cli,html \
            --reporter-html-export newman/reports/api-test-report.html \
            2>&1 | tee newman/reports/newman-output.log

          NEWMAN_EXIT_CODE=${PIPESTATUS[0]}

          echo "Newman exit code: $NEWMAN_EXIT_CODE"
          echo "exit_code=$NEWMAN_EXIT_CODE" >> "$GITHUB_OUTPUT"

          echo "Generated report files:"
          find newman/reports -maxdepth 2 -type f -print

          exit 0

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: newman-api-report
          path: newman/reports/
          if-no-files-found: error
          retention-days: 30

      - name: Add test summary
        if: always()
        shell: bash
        run: |
          echo "## Postman API test results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Newman exit code: ${{ steps.newman.outputs.exit_code }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the **newman-api-report** artifact to view the HTML report and execution log." >> "$GITHUB_STEP_SUMMARY"

      - name: Fail pipeline when API tests fail
        if: always() && steps.newman.outputs.exit_code != '0'
        run: |
          echo "API tests failed with Newman exit code: ${{ steps.newman.outputs.exit_code }}"
          exit 1

      - name: Confirm successful tests
        if: steps.newman.outputs.exit_code == '0'
        run: |
          echo "All Postman API tests passed successfully."
```
