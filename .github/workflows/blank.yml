name: Postman API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-tests:
    name: Run Postman CLI API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Postman files exist
        run: |
          missing=0
          for file in \
            postman/SauceDemo_API_Collection.json \
            postman/SauceDemo_Environment.json; do
            if [ ! -f "$file" ]; then
              echo "::error file=$file::Required file not found. Add and push the postman/ directory to the repository."
              missing=1
            else
              echo "Found $file"
            fi
          done
          exit $missing

      - name: Make script executable
        run: chmod +x newman/run-api-tests.sh

      - name: Run Postman API tests
        id: run-tests
        run: ./newman/run-api-tests.sh
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-api-report
          path: |
            newman/reports/api-test-report.html
            newman/reports/junit-report.xml
          if-no-files-found: warn
          retention-days: 30

      - name: Add test summary
        if: always()
        run: |
          {
            echo "## Postman API test results"
            echo ""
            if [ "${{ steps.run-tests.outcome }}" = "success" ]; then
              echo "All Postman API tests passed."
            else
              echo "API tests failed."
            fi
            echo ""
            echo "Download the **postman-api-report** artifact for HTML and JUnit reports."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail pipeline when API tests fail
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "API tests failed. See the Postman CLI output or downloaded reports."
          exit 1
