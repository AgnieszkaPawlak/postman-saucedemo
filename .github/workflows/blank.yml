name: Postman API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  api-tests:
    name: Run Newman API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Newman and reporters
        run: npm install -g newman newman-reporter-html newman-reporter-allure allure-commandline

      - name: Verify Postman files exist
        run: |
          missing=0
          for file in \
            postman/SauceDemo_API_Collection.json \
            postman/SauceDemo_Environment.json; do
            if [ ! -f "$file" ]; then
              echo "::error file=$file::Required file not found. Add and push the postman/ directory to the repository."
              missing=1
            else
              echo "Found $file"
            fi
          done
          exit $missing

      - name: Run Postman API tests
        id: run-tests
        run: |
          mkdir -p newman/reports/allure-results
          newman run postman/SauceDemo_API_Collection.json \
            --environment postman/SauceDemo_Environment.json \
            --reporters cli,html,allure \
            --reporter-html-export newman/reports/api-test-report.html \
            --reporter-allure-resultsDir newman/reports/allure-results \
            --color on
        continue-on-error: true

      - name: Load Allure history
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.13
        id: allure-report
        with:
          allure_results: newman/reports/allure-results
          gh_pages: gh-pages
          allure_history: allure-history

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-api-report
          path: |
            newman/reports/api-test-report.html
            newman/reports/allure-results/
            allure-history/
          if-no-files-found: warn
          retention-days: 30

      - name: Add test summary
        if: always()
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          REPORT_URL="https://${OWNER}.github.io/${REPO}/"

          {
            echo "## Postman API test results"
            echo ""
            if [ "${{ steps.run-tests.outcome }}" = "success" ]; then
              echo "All Postman API tests passed."
            else
              echo "API tests failed."
            fi
            echo ""
            echo "### Allure Report"
            echo ""
            echo "[Open Allure Report](${REPORT_URL})"
            echo ""
            echo "On \`main\`, the deploy job publishes this report to GitHub Pages. After it completes, use the **github-pages** link in the workflow run header."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail pipeline when API tests fail
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "API tests failed. See the Newman CLI output or the Allure report."
          exit 1

  deploy-allure:
    name: Deploy Allure Report
    needs: api-tests
    if: always() && needs.api-tests.result != 'cancelled' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    environment:
      name: github-pages
      url: ${{ steps.set-url.outputs.page_url }}

    steps:
      - name: Set GitHub Pages URL
        id: set-url
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "page_url=https://${OWNER}.github.io/${REPO}/" >> "$GITHUB_OUTPUT"

      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: newman-api-report
          path: report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: report/allure-history
