name: API Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-api-tests:
    name: Run Postman CLI API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Make Script Executable
        run: chmod +x newman/run-api-tests.sh

      - name: Run API Tests
        id: run-tests
        run: ./newman/run-api-tests.sh
        continue-on-error: true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: postman-api-report
          path: |
            newman/reports/api-test-report.html
            newman/reports/junit-report.xml
          if-no-files-found: warn
          retention-days: 30

      - name: Check Test Results
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "API tests failed. Check the HTML or JUnit report artifact for details."
          exit 1

      - name: Success Summary
        if: steps.run-tests.outcome == 'success'
        run: |
          echo "All API tests passed successfully!"
